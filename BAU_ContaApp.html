<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAU — Gestión de Obras</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; font-size: 14px; background: #f4f4f4; color: #222; }

.nav { background: #1a1a2e; color: white; display: flex; align-items: center; padding: 0 20px; height: 50px; }
.nav-brand { font-weight: bold; font-size: 18px; margin-right: 30px; color: #c8f542; }
.nav-btn { background: none; border: none; color: #ccc; padding: 0 18px; height: 50px; cursor: pointer; font-size: 14px; border-bottom: 3px solid transparent; }
.nav-btn:hover { color: white; background: rgba(255,255,255,0.05); }
.nav-btn.active { color: white; border-bottom: 3px solid #c8f542; }

.main { padding: 20px; max-width: 1500px; margin: 0 auto; }

.config-panel { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 14px 18px; margin-bottom: 14px; }
.config-panel h3 { font-size: 11px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.config-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
.config-row label { font-size: 12px; color: #555; white-space: nowrap; min-width: 160px; }
.config-input { border: 1px solid #ccc; border-radius: 4px; padding: 6px 10px; font-size: 13px; width: 370px; }
.config-input:focus { outline: none; border-color: #1a1a2e; }
.config-status { margin-top: 6px; font-size: 12px; color: #888; }

.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
.toolbar-left { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.toolbar-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.inp-search { border: 1px solid #ccc; border-radius: 4px; padding: 6px 10px; font-size: 13px; width: 210px; }
.sel-filter { border: 1px solid #ccc; border-radius: 4px; padding: 6px 8px; font-size: 13px; background: white; }

.btn { padding: 7px 13px; border-radius: 4px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
.btn:hover { opacity: .85; }
.btn-primary   { background: #1a1a2e; color: white; }
.btn-danger    { background: #e74c3c; color: white; }
.btn-secondary { background: #eee; color: #333; border: 1px solid #ccc; }
.btn-sync      { background: #2980b9; color: white; }
.btn-sm        { padding: 3px 8px; font-size: 12px; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; white-space: nowrap; }
.badge-vencido   { background: #fde8e8; color: #c0392b; }
.badge-pagado    { background: #e8f8f0; color: #27ae60; }
.badge-pendiente { background: #fef9e7; color: #d68910; }
.badge-cobrar    { background: #eaf4fb; color: #2471a3; }

.bulk-bar { background: #1a1a2e; color: white; padding: 8px 16px; border-radius: 4px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; font-size: 13px; }
.bulk-bar span { flex: 1; }

.summary-row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.sum-card { background: white; border: 1px solid #ddd; border-radius: 5px; padding: 10px 16px; min-width: 150px; }
.sum-label { font-size: 11px; color: #888; margin-bottom: 2px; }
.sum-val { font-size: 16px; font-weight: bold; font-family: monospace; }
.sum-val.green { color: #27ae60; }
.sum-val.red   { color: #e74c3c; }

.table-wrap { background: white; border-radius: 6px; border: 1px solid #ddd; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: #1a1a2e; color: white; padding: 9px 10px; text-align: left; white-space: nowrap; font-size: 12px; font-weight: 600; }
thead th.sortable { cursor: pointer; user-select: none; }
thead th.sortable:hover { background: #2d2d4e; }
tbody td { padding: 8px 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #fafafa; }
tbody tr.row-selected td { background: #eaf4fb; }
td.num { text-align: right; font-family: monospace; font-size: 12px; }
td.check-col, th.check-col { width: 36px; text-align: center; }
td.actions { white-space: nowrap; width: 72px; }
.empty-table { text-align: center; padding: 32px; color: #bbb; font-size: 13px; }

.pagination { display: flex; justify-content: space-between; align-items: center; padding: 9px 14px; font-size: 12px; color: #888; border-top: 1px solid #eee; }
.pag-btns { display: flex; gap: 4px; }
.pag-btn { padding: 3px 9px; border: 1px solid #ccc; border-radius: 3px; background: white; cursor: pointer; font-size: 12px; }
.pag-btn:disabled { opacity: .4; cursor: default; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 1000; display: flex; align-items: flex-start; justify-content: center; padding: 30px 20px; overflow-y: auto; }
.modal { background: white; border-radius: 8px; width: 720px; max-width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #eee; }
.modal-title { font-size: 16px; font-weight: bold; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; }
.modal-body { padding: 18px 20px; max-height: 72vh; overflow-y: auto; }
.modal-footer { padding: 12px 20px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 8px; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-full { grid-column: 1 / -1; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 11px; color: #666; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }
.form-group input, .form-group select, .form-group textarea { border: 1px solid #ccc; border-radius: 4px; padding: 7px 9px; font-size: 13px; font-family: Arial, sans-serif; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #1a1a2e; }
.form-section-title { grid-column: 1/-1; font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-top: 8px; padding-bottom: 4px; border-bottom: 1px solid #eee; }

/* AUTOCOMPLETE */
.ac-wrap { position: relative; }
.ac-input { width: 100%; }
.ac-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ccc; border-top: none; border-radius: 0 0 4px 4px; max-height: 190px; overflow-y: auto; z-index: 300; box-shadow: 0 4px 12px rgba(0,0,0,.12); display: none; }
.ac-item { padding: 7px 10px; cursor: pointer; }
.ac-item:hover { background: #eaf4fb; }
.ac-item-name { font-weight: 600; font-size: 13px; }
.ac-item-sub { font-size: 11px; color: #888; }
.ac-new { padding: 7px 10px; cursor: pointer; font-size: 12px; color: #2980b9; border-top: 1px solid #eee; }
.ac-new:hover { background: #f0f8ff; }

.proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px,1fr)); gap: 12px; }
.proj-card { background: white; border: 1px solid #ddd; border-radius: 6px; padding: 14px; }
.proj-card-num { font-size: 11px; color: #888; margin-bottom: 3px; }
.proj-card-nombre { font-size: 15px; font-weight: bold; margin-bottom: 5px; }
.proj-card-cliente { font-size: 13px; color: #555; margin-bottom: 10px; }
.proj-card-footer { display: flex; justify-content: space-between; align-items: center; }

.section-title { font-size: 20px; font-weight: bold; }
.section-count { font-size: 13px; color: #888; }

#toast { position: fixed; bottom: 24px; right: 24px; background: #222; color: white; padding: 11px 18px; border-radius: 6px; font-size: 13px; z-index: 9999; display: none; box-shadow: 0 4px 12px rgba(0,0,0,.3); }
</style>
</head>
<body>

<div class="nav">
  <div class="nav-brand">BAU</div>
  <button class="nav-btn active" data-tab="proyectos">Proyectos</button>
  <button class="nav-btn" data-tab="compras">Compras</button>
  <button class="nav-btn" data-tab="ventas">Ventas</button>
  <button class="nav-btn" data-tab="clientes">Clientes</button>
  <button class="nav-btn" data-tab="proveedores">Proveedores</button>
</div>

<div class="main" id="main"></div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwBVXUO95yrrupeCaXxhJHUrSiT5KkzSp0tjUHr2PE2j9trVvNGfmBJ45_oMTky-gbBHQ/exec';

let currentTab = 'proyectos';
let config = JSON.parse(localStorage.getItem('bau_config') || '{}');
let data = { compras:[], ventas:[], proyectos:[] };
let contactos = { clientes:[], proveedores:[] };
let syncStatus = { compras: 'idle', ventas: 'idle' }; // idle | loading | ok | error
let tableState = {
  compras: { page:1, perPage:20, search:'', filtroEstado:'', sortCol:'Emisión', sortDir:-1, selected: new Set() },
  ventas:  { page:1, perPage:20, search:'', filtroEstado:'', sortCol:'Emisión', sortDir:-1, selected: new Set() },
};
let proyState      = { page:1, perPage:20, search:'', filtroEstado:'' };
let contactoState  = {
  clientes:    { page:1, perPage:20, search:'' },
  proveedores: { page:1, perPage:20, search:'' },
};

// ═══════════════════════════════════════════════
// COLUMNAS
// ═══════════════════════════════════════════════
const COLS_COMPRAS_ALL = ['Id','Emisión','Vencimiento','Servicio Desde','Servicio Hasta','Proveedor','CUIT','Categoría','Tipo','Punto de Venta','N° de Factura','N° de Remito','Transportista','Subtotal sin Descuento','Descuento en $','Subtotal con Descuento','Importe Neto No Gravado','Importe Neto Exento','Importe Neto Gravado','IVA - 2,5%','IVA - 5%','IVA - 10,5%','IVA - 21%','IVA - 27%','Perc. IVA','Perc. IIBB','Imp. Internos','Imp. Municipales','Sellos','Total Compra','Total ND','Total NC','Pagado','A Pagar','Estado','Etiquetas','Medio de Pago','Nota Interna','Usuario','Productos'];
const COLS_VENTAS_ALL  = ['Id','Emisión','Vencimiento','Servicio Desde','Servicio Hasta','Categoría','Cliente','CUIT','Tipo','Punto de Venta','N° de Factura','N° de Remito','Transportista','Vendedor','Lista de Precios','Subtotal Sin Descuento','Descuento en $','Subtotal con Descuento','Importe Neto No Gravado','Importe Neto Exento','Importe Neto Gravado','IVA - 2,5%','IVA - 5%','IVA - 10,5%','IVA - 21%','IVA - 27%','Perc. IVA','Perc. IIBB','Imp. Internos','Imp. Municipales','Total Venta','Total ND','Total NC','Cobrado','A Cobrar','Estado','Etiquetas','Medio de Cobro','Nota Cliente','Nota Interna','Teléfono','Celular','Dirección','Localidad','Provincia','Email','Productos','Usuario'];
const COLS_COMPRAS_TABLE = ['Estado','Emisión','Proveedor','Categoría','N° de Factura','Subtotal sin Descuento','Total Compra','Pagado','A Pagar','Etiquetas','Medio de Pago','Nota Interna'];
const COLS_VENTAS_TABLE  = ['Estado','Emisión','Cliente','Etiquetas','Categoría','N° de Factura','Subtotal Sin Descuento','Total Venta','A Cobrar','Cobrado','Medio de Cobro'];
const COLS_MONEY = new Set(['Subtotal sin Descuento','Subtotal Sin Descuento','Descuento en $','Subtotal con Descuento','Importe Neto No Gravado','Importe Neto Exento','Importe Neto Gravado','IVA - 2,5%','IVA - 5%','IVA - 10,5%','IVA - 21%','IVA - 27%','Perc. IVA','Perc. IIBB','Imp. Internos','Imp. Municipales','Sellos','Total Compra','Total Venta','Total ND','Total NC','Pagado','A Pagar','Cobrado','A Cobrar','Lista de Precios']);

const SECCIONES_COMPRAS = [
  { t:'Proveedor',              c:['Proveedor','CUIT'] },
  { t:'Factura',                c:['Emisión','Vencimiento','Tipo','Punto de Venta','N° de Factura','N° de Remito','Servicio Desde','Servicio Hasta'] },
  { t:'Importes',               c:['Subtotal sin Descuento','Descuento en $','Subtotal con Descuento','Importe Neto No Gravado','Importe Neto Exento','Importe Neto Gravado','IVA - 2,5%','IVA - 5%','IVA - 10,5%','IVA - 21%','IVA - 27%','Perc. IVA','Perc. IIBB','Imp. Internos','Imp. Municipales','Sellos','Total Compra','Total ND','Total NC','Pagado','A Pagar'] },
  { t:'Clasificación y notas',  c:['Categoría','Estado','Etiquetas','Medio de Pago','Nota Interna','Transportista','Productos','Usuario'] },
];
const SECCIONES_VENTAS = [
  { t:'Cliente',                c:['Cliente','Etiquetas','CUIT','Teléfono','Celular','Email','Dirección','Localidad','Provincia'] },
  { t:'Factura',                c:['Emisión','Vencimiento','Tipo','Punto de Venta','N° de Factura','N° de Remito','Servicio Desde','Servicio Hasta','Vendedor','Lista de Precios'] },
  { t:'Importes',               c:['Subtotal Sin Descuento','Descuento en $','Subtotal con Descuento','Importe Neto No Gravado','Importe Neto Exento','Importe Neto Gravado','IVA - 2,5%','IVA - 5%','IVA - 10,5%','IVA - 21%','IVA - 27%','Perc. IVA','Perc. IIBB','Imp. Internos','Imp. Municipales','Total Venta','Total ND','Total NC','Cobrado','A Cobrar'] },
  { t:'Clasificación y notas',  c:['Categoría','Estado','Etiquetas','Medio de Cobro','Nota Cliente','Nota Interna','Transportista','Productos','Usuario'] },
];

// ═══════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════
document.querySelector('.nav').addEventListener('click', e => {
  const btn = e.target.closest('.nav-btn');
  if (!btn) return;
  currentTab = btn.dataset.tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === currentTab));
  render();
});

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function render() {
  const main = document.getElementById('main');
  if (currentTab === 'proyectos')   { main.innerHTML = renderProyectos(); bindProyEventos(); return; }
  if (currentTab === 'clientes' || currentTab === 'proveedores') { main.innerHTML = renderContactos(currentTab); bindContactosEventos(currentTab); return; }
  main.innerHTML = renderCV(currentTab);
  bindTableEvents(currentTab);
}

function renderCV(tipo) {
  const st = tableState[tipo];
  const cols = tipo==='compras' ? COLS_COMPRAS_TABLE : COLS_VENTAS_TABLE;
  const label = tipo==='compras' ? 'Compras' : 'Ventas';
  const sheetId = config[tipo+'_sheet_id']||'';
  const ctSheetId = config['contrapartes_sheet_id']||'';
  const totalCol  = tipo==='compras' ? 'Total Compra'  : 'Total Venta';
  const pagadoCol = tipo==='compras' ? 'Pagado'  : 'Cobrado';
  const pendCol   = tipo==='compras' ? 'A Pagar' : 'A Cobrar';

  const filtered = getFiltered(tipo);
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / st.perPage));
  st.page = Math.min(st.page, totalPages);
  const pageRows = filtered.slice((st.page-1)*st.perPage, st.page*st.perPage);

  const sumTotal  = (data[tipo]||[]).reduce((s,r)=>s+(parseFloat(String(r[totalCol] ||'').replace(/[^0-9.-]/g,''))||0),0);
  const sumPagado = (data[tipo]||[]).reduce((s,r)=>s+(parseFloat(String(r[pagadoCol]||'').replace(/[^0-9.-]/g,''))||0),0);
  const sumPend   = (data[tipo]||[]).reduce((s,r)=>s+(parseFloat(String(r[pendCol]  ||'').replace(/[^0-9.-]/g,''))||0),0);
  const nSel = st.selected.size;

  const allPageSelected = pageRows.length > 0 && pageRows.every(r => st.selected.has(rkey(r)));

  return `
  <div class="config-panel">
    <div class="config-row">
      <span style="font-size:13px;font-weight:600">${label}</span>
      <span style="font-size:12px;color:#888;margin-left:4px">${syncStatusLabel(tipo)}</span>
      <button class="btn btn-sync btn-sm" onclick="syncDesdeScript('${tipo}')">🔄 Actualizar desde Drive</button>
      <label class="btn btn-secondary btn-sm" style="cursor:pointer;margin-bottom:0">
        📂 Importar archivo
        <input type="file" id="inp-import-${tipo}" accept=".xlsx,.xls,.csv" style="display:none">
      </label>
    </div>
  </div>

  ${nSel > 0 ? `<div class="bulk-bar">
    <span>${nSel} registro${nSel>1?'s':''} seleccionado${nSel>1?'s':''}</span>
    <button class="btn btn-danger btn-sm" id="btn-del-sel">🗑 Eliminar seleccionados</button>
    <button class="btn btn-secondary btn-sm" id="btn-clear-sel">Cancelar</button>
  </div>` : ''}

  <div class="toolbar">
    <div class="toolbar-left">
      <span class="section-title">${label}</span>
      <span class="section-count">${total} registros</span>
    </div>
    <div class="toolbar-right">
      <input type="text" class="inp-search" id="inp-search" placeholder="Buscar..." value="${esc(st.search)}">
      <select class="sel-filter" id="sel-estado">
        <option value="">Todos los estados</option>
        <option value="vencido"   ${st.filtroEstado==='vencido'  ?'selected':''}>Vencido</option>
        <option value="pagado"    ${st.filtroEstado==='pagado'   ?'selected':''}>Pagado</option>
        <option value="pendiente" ${st.filtroEstado==='pendiente'?'selected':''}>Pendiente</option>
        <option value="cobrar"    ${st.filtroEstado==='cobrar'   ?'selected':''}>A Cobrar / A Pagar</option>
      </select>
      <label class="btn btn-secondary" style="cursor:pointer" title="Importar Excel o CSV de Contagram">
        📂 Importar archivo
        <input type="file" id="inp-import-${tipo}" accept=".xlsx,.xls,.csv" style="display:none">
      </label>
      <button class="btn btn-primary" onclick="openModal('${tipo}',null)">+ Agregar registro</button>
    </div>
  </div>

  <div class="summary-row">
    <div class="sum-card"><div class="sum-label">Total facturado</div><div class="sum-val">${fmtM(sumTotal)}</div></div>
    <div class="sum-card"><div class="sum-label">${pagadoCol}</div><div class="sum-val green">${fmtM(sumPagado)}</div></div>
    <div class="sum-card"><div class="sum-label">${pendCol}</div><div class="sum-val red">${fmtM(sumPend)}</div></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th class="check-col"><input type="checkbox" id="chk-all" ${allPageSelected?'checked':''}></th>
        ${cols.map(c=>`<th class="sortable" data-col="${esc(c)}">${esc(c)}${st.sortCol===c?(st.sortDir===1?' ▲':' ▼'):''}</th>`).join('')}
        <th>Acciones</th>
      </tr></thead>
      <tbody>
        ${pageRows.length===0
          ? `<tr><td colspan="${cols.length+2}" class="empty-table">${st.search||st.filtroEstado?'Sin resultados para los filtros aplicados.':'Sin registros. Agregá uno o conectá un Sheet.'}</td></tr>`
          : pageRows.map(r=>{
              const k=rkey(r), sel=st.selected.has(k);
              return `<tr class="${sel?'row-selected':''}" data-rkey="${esc(k)}">
                <td class="check-col"><input type="checkbox" class="row-chk" data-key="${esc(k)}" ${sel?'checked':''}></td>
                ${cols.map(c=>`<td class="${COLS_MONEY.has(c)?'num':''}">${renderCell(c,r[c])}</td>`).join('')}
                <td class="actions">
                  <button class="btn btn-sm btn-secondary row-edit" data-key="${esc(k)}" title="Editar">✏️</button>
                  <button class="btn btn-sm btn-danger row-del" data-key="${esc(k)}" title="Eliminar">🗑</button>
                </td>
              </tr>`;
            }).join('')}
      </tbody>
    </table>
    <div class="pagination">
      <span>${total} registros · Página ${st.page} de ${totalPages}</span>
      <div class="pag-btns">
        <button class="pag-btn" id="pag-prev" ${st.page<=1?'disabled':''}>‹ Anterior</button>
        <button class="pag-btn" id="pag-next" ${st.page>=totalPages?'disabled':''}>Siguiente ›</button>
      </div>
    </div>
  </div>`;
}

function renderCell(col, val) {
  if (val===null||val===undefined||val==='') return '<span style="color:#ddd">—</span>';
  if (col==='Estado') return badgeEstado(val);
  if (COLS_MONEY.has(col)) return fmtM(val);
  const s = String(val);
  return esc(s.length>45 ? s.slice(0,45)+'…' : s);
}

function badgeEstado(val) {
  const v=String(val).toLowerCase();
  if (v.includes('vencido'))  return `<span class="badge badge-vencido">${esc(val)}</span>`;
  if (v.includes('pagado')||v.includes('cobrado')) return `<span class="badge badge-pagado">${esc(val)}</span>`;
  if (v.includes('cobrar')||v.includes('pagar'))   return `<span class="badge badge-cobrar">${esc(val)}</span>`;
  return `<span class="badge badge-pendiente">${esc(val)}</span>`;
}

function rkey(r) {
  return [r['Id']||'', r['N° de Factura']||'', r['Emisión']||''].join('|');
}

// ═══════════════════════════════════════════════
// EVENTOS DE TABLA
// ═══════════════════════════════════════════════
function bindTableEvents(tipo) {
  const st = tableState[tipo];

  document.getElementById('inp-search')?.addEventListener('input', e => { st.search=e.target.value; st.page=1; render(); });
  document.getElementById('sel-estado')?.addEventListener('change', e => { st.filtroEstado=e.target.value; st.page=1; render(); });
  document.getElementById('pag-prev')?.addEventListener('click', () => { st.page--; render(); });
  document.getElementById('pag-next')?.addEventListener('click', () => { st.page++; render(); });

  document.getElementById('chk-all')?.addEventListener('change', e => {
    const filtered=getFiltered(tipo), pageRows=filtered.slice((st.page-1)*st.perPage, st.page*st.perPage);
    pageRows.forEach(r => { e.target.checked ? st.selected.add(rkey(r)) : st.selected.delete(rkey(r)); });
    render();
  });

  document.querySelectorAll('.row-chk').forEach(chk => {
    chk.addEventListener('change', e => {
      const k=e.target.dataset.key;
      e.target.checked ? st.selected.add(k) : st.selected.delete(k);
      render();
    });
  });

  document.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const col=th.dataset.col;
      if (st.sortCol===col) st.sortDir*=-1; else { st.sortCol=col; st.sortDir=1; }
      render();
    });
  });

  document.querySelectorAll('.row-edit').forEach(btn => {
    btn.addEventListener('click', () => openModal(tipo, btn.dataset.key));
  });
  document.querySelectorAll('.row-del').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!confirm('¿Eliminar este registro?')) return;
      const k = btn.dataset.key;
      data[tipo] = data[tipo].filter(r => rkey(r) !== k);
      saveLocal(tipo); render(); toast('Eliminando en Sheet...');
      fetch(APPS_SCRIPT_URL + '?accion=delete&tipo=' + tipo + '&id_viejo=' + encodeURIComponent(k))
      .then(r => r.json())
      .then(j => {
        if (j.ok) toast('Registro eliminado del Sheet');
        else toast('Error al eliminar del Sheet: ' + (j.error||''));
      })
      .catch(err => toast('No se pudo conectar al Sheet: ' + err.message));
    });
  });

  document.getElementById('btn-del-sel')?.addEventListener('click', () => {
    if (!confirm(`¿Eliminar ${st.selected.size} registros?`)) return;
    const keys = [...st.selected];
    data[tipo] = data[tipo].filter(r => !st.selected.has(rkey(r)));
    st.selected.clear(); saveLocal(tipo); render();
    toast('Eliminando en Sheet...');
    Promise.all(keys.map(k =>
      fetch(APPS_SCRIPT_URL + '?accion=delete&tipo=' + tipo + '&id_viejo=' + encodeURIComponent(k))
      .then(r => r.json())
    )).then(results => {
      const errores = results.filter(j => !j.ok).length;
      if (errores === 0) toast(keys.length + ' registros eliminados del Sheet');
      else toast(errores + ' errores al eliminar del Sheet');
    }).catch(() => toast('Error al conectar con el Sheet'));
  });
  document.getElementById('btn-clear-sel')?.addEventListener('click', () => { st.selected.clear(); render(); });

  // Importar archivo
  document.getElementById('inp-import-'+tipo)?.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) importarArchivo(tipo, file);
    e.target.value = ''; // reset para permitir reimportar mismo archivo
  });
}

let mCtx = {};

    <div class="modal">

                  <div class="ac-wrap">

              if (campo==='Estado') return `

                  <select id="${fid}">
                    ${['','Vencido','Pagado','A Cobrar','A Pagar','Pendiente'].map(o=>`<option value="${o}" ${val===o?'selected':''}>${o||'— sin estado —'}</option>`).join('')}
                  </select></div>`;

function initAC(tipo) {
  const cpField = tipo==='compras' ? 'Proveedor' : 'Cliente';
  const ctList  = tipo==='compras' ? contactos.proveedores : contactos.clientes;
  const inp = document.getElementById('mf_'+fid2(cpField));
  const drop= document.getElementById('ac-drop');
  if (!inp||!drop) return;

  const fillFields = c => {
    const mapa = { 'CUIT':c.cuit,'Teléfono':c.telefono,'Celular':c.celular,'Email':c.email,'Dirección':c.direccion,'Localidad':c.localidad,'Provincia':c.provincia };
    Object.entries(mapa).forEach(([campo,val])=>{
      const el=document.getElementById('mf_'+fid2(campo));
      if (el && val) el.value=val;
    });
  };

  const showDrop = q => {
    const matches = q.length===0
      ? ctList.slice(0,8)
      : ctList.filter(c=>c.nombre.toLowerCase().includes(q.toLowerCase())||(c.cuit||'').includes(q)).slice(0,8);
    if (matches.length===0&&q.length<2) { drop.style.display='none'; return; }
    drop.innerHTML = matches.map(c=>`
      <div class="ac-item" data-nombre="${esc(c.nombre)}">
        <div class="ac-item-name">${esc(c.nombre)}</div>
        <div class="ac-item-sub">${esc([c.cuit,c.email,c.telefono].filter(Boolean).join(' · '))}</div>
      </div>`).join('') +
      (q.length>=2 ? `<div class="ac-new" id="ac-new">+ Guardar "${esc(q)}" como nuevo contacto</div>` : '');
    drop.style.display='block';
    drop.querySelectorAll('.ac-item').forEach(el=>{
      el.addEventListener('click', ()=>{
        const c=matches.find(x=>x.nombre===el.dataset.nombre);
        if(c){ inp.value=c.nombre; fillFields(c); }
        drop.style.display='none';
      });
    });
    document.getElementById('ac-new')?.addEventListener('click', ()=>{ drop.style.display='none'; });
  };

  inp.addEventListener('input', ()=>showDrop(inp.value));
  inp.addEventListener('focus', ()=>showDrop(inp.value));
  document.addEventListener('mousedown', e=>{ if(!inp.contains(e.target)&&!drop.contains(e.target)) drop.style.display='none'; });
  // Si es ventas, inicializar autocomplete de proyectos también
  if (tipo === 'ventas') initAC_Proyecto();
}

function initAC_Proyecto() {
  const inp  = document.getElementById('mf_Etiquetas');
  if (!inp) return;
  // Crear dropdown propio para proyectos
  const dropId = 'ac-drop-proy';
  let drop = document.getElementById(dropId);
  if (!drop) {
    drop = document.createElement('div');
    drop.className = 'ac-dropdown';
    drop.id = dropId;
    inp.parentNode.style.position = 'relative';
    inp.parentNode.appendChild(drop);
  }

  const showDrop = q => {
    const proyList = data.proyectos || [];
    const matches = q.length === 0
      ? proyList.slice(0, 8)
      : proyList.filter(p => (p.nombre||'').toLowerCase().includes(q.toLowerCase()) || (p.numero||'').includes(q)).slice(0, 8);
    if (matches.length === 0 && q.length < 2) { drop.style.display='none'; return; }
    drop.innerHTML = matches.map(p=>`
      <div class="ac-item" data-nombre="${esc(p.nombre||'')}">
        <div class="ac-item-name">${esc(p.nombre||'Sin nombre')}</div>
        <div class="ac-item-sub">${esc([p.numero, p.cliente].filter(Boolean).join(' · '))}</div>
      </div>`).join('') +
      (q.length >= 2 ? `<div class="ac-new" id="ac-new-proy">+ Crear proyecto "${esc(q)}"</div>` : '');
    drop.style.display = 'block';
    drop.querySelectorAll('.ac-item').forEach(el => {
      el.addEventListener('click', () => { inp.value = el.dataset.nombre; drop.style.display='none'; });
    });
    document.getElementById('ac-new-proy')?.addEventListener('click', () => { drop.style.display='none'; });
  };

  inp.addEventListener('input',  () => showDrop(inp.value));
  inp.addEventListener('focus',  () => showDrop(inp.value));
  document.addEventListener('mousedown', e => { if(!inp.contains(e.target)&&!drop.contains(e.target)) drop.style.display='none'; });
}

function saveModal() {
  const { tipo, editKey, allCols, cpField } = mCtx;
  const ctList = tipo==='compras' ? contactos.proveedores : contactos.clientes;
  const newRow = {};
  allCols.forEach(campo => {
    const el=document.getElementById('mf_'+fid2(campo));
    if(el) newRow[campo]=el.value;
  });
  // Preservar el Id original al editar (no está en el formulario)
  if (editKey) {
    const rowOrig = data[tipo].find(r=>rkey(r)===editKey);
    if (rowOrig && rowOrig['Id']) newRow['Id'] = rowOrig['Id'];
  }

  // Guardar contraparte nueva en memoria Y en Sheet de Contactos
  const nombre = newRow[cpField];
  if (nombre && !ctList.find(c=>c.nombre.toLowerCase()===nombre.toLowerCase())) {
    const nuevoContacto = {
      nombre,
      cuit:      newRow['CUIT']       || '',
      telefono:  newRow['Teléfono']   || '',
      celular:   newRow['Teléfono 2'] || '',
      email:     newRow['Email']      || '',
      direccion: newRow['Dirección']  || '',
      localidad: newRow['Localidad']  || '',
      provincia: newRow['Provincia']  || '',
    };
    ctList.push(nuevoContacto);
    saveContactos();
    // Enviar al Sheet de Contactos
    const pestania = tipo === 'compras' ? 'proveedores' : 'clientes';
    const filaContacto = encodeURIComponent(JSON.stringify({
      'Proveedor': pestania === 'proveedores' ? nombre : '',
      'Cliente':   pestania === 'clientes'    ? nombre : '',
      'CUIT':      nuevoContacto.cuit,
      'Teléfono':  nuevoContacto.telefono,
      'Teléfono 2':nuevoContacto.celular,
      'Email':     nuevoContacto.email,
      'Dirección': nuevoContacto.direccion,
      'Localidad': nuevoContacto.localidad,
      'Provincia': nuevoContacto.provincia,
    }));
    fetch(APPS_SCRIPT_URL + '?accion=append_contacto&pestania=' + pestania + '&fila=' + filaContacto)
    .then(r=>r.json())
    .then(j=>{ if(j.ok) toast('Contacto guardado en base de datos'); })
    .catch(()=>{});
  }

  // Auto-crear proyecto si no existe (solo ventas)
  if (tipo === 'ventas') {
    const etiqueta = newRow['Etiquetas'] || '';
    if (etiqueta && !data.proyectos.find(p => (p.nombre||'').toLowerCase() === etiqueta.toLowerCase())) {
      const nuevoProyecto = {
        nombre:  etiqueta,
        cliente: newRow['Cliente'] || '',
        estado:  'Presupuestado',
        numero:  '', moneda: 'ARS', monto: '', inicio: '', fin: '', direccion: '', notas: ''
      };
      data.proyectos.push(nuevoProyecto);
      saveLocal('proyectos');
      const payload = encodeURIComponent(JSON.stringify(nuevoProyecto));
      fetch(APPS_SCRIPT_URL + '?accion=append&tipo=proyectos&fila=' + payload)
      .then(r=>r.json()).then(j=>{
        if(j.ok && j.id) {
          const idx2 = data.proyectos.findIndex(p=>p===nuevoProyecto);
          if(idx2>=0){ data.proyectos[idx2]['Id']=String(j.id); saveLocal('proyectos'); }
          toast('Proyecto "'+etiqueta+'" creado (Id: '+j.id+')');
        }
      }).catch(()=>{});
    }
  }

  if (editKey) {
    const idx=data[tipo].findIndex(r=>rkey(r)===editKey);
    if(idx>=0) data[tipo][idx]=newRow;
    saveLocal(tipo); closeModal(); render();
    toast('Actualizando en Sheet...');
    const payload = encodeURIComponent(JSON.stringify(newRow));
    const idEnc   = encodeURIComponent(editKey);
    fetch(APPS_SCRIPT_URL + '?accion=update&tipo=' + tipo + '&fila=' + payload + '&id_viejo=' + idEnc)
    .then(r => r.json())
    .then(j => {
      if (j.ok) toast('Registro actualizado en Sheet');
      else toast('Error al actualizar en Sheet: ' + (j.error||''));
    })
    .catch(err => toast('No se pudo conectar al Sheet: ' + err.message));
  } else {
    data[tipo].push(newRow);
    saveLocal(tipo); closeModal(); render();
    toast('Guardando en Sheet...');
    const payload = encodeURIComponent(JSON.stringify(newRow));
    fetch(APPS_SCRIPT_URL + '?accion=append&tipo=' + tipo + '&fila=' + payload)
    .then(r => r.json())
    .then(j => {
      if (j.ok) {
        // Guardar el Id asignado por el Sheet en el registro local
        if (j.id) {
          const idx = data[tipo].findIndex(r => rkey(r) === rkey(newRow));
          if (idx >= 0) { data[tipo][idx]['Id'] = String(j.id); saveLocal(tipo); }
        }
        toast('Registro guardado en Sheet (Id: ' + (j.id||'?') + ')');
      } else toast('Error al guardar en Sheet: ' + (j.error||''));
    })
    .catch(err => toast('No se pudo conectar al Sheet: ' + err.message));
  }
}

  document.getElementById('modal-overlay')?.remove();

// IMPORTAR ARCHIVO LOCAL (Excel / CSV de Contagram)
// ═══════════════════════════════════════════════
function importarArchivo(tipo, file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      let rows = [];
      const name = file.name.toLowerCase();

      if (name.endsWith('.csv')) {
        rows = parseCSV(new TextDecoder('utf-8').decode(e.target.result));
      } else {
        const wb = XLSX.read(e.target.result, { type:'array', cellDates:true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        rows = XLSX.utils.sheet_to_json(ws, { defval:'' });
        // Normalizar fechas de objetos Date a string ISO
        rows = rows.map(r => {
          const out = {};
          Object.entries(r).forEach(([k,v]) => {
            if (v instanceof Date) out[k] = v.toLocaleDateString('es-AR');
            else out[k] = String(v === null || v === undefined ? '' : v);
          });
          return out;
        });
      }

      if (rows.length === 0) { toast('⚠️ El archivo no tiene datos'); return; }

      // Detectar duplicados por Id o por (contraparte + N° factura)
      const existentes = data[tipo];
      const cpField = tipo === 'compras' ? 'Proveedor' : 'Cliente';
      let nuevos = 0, duplicados = 0;

      rows.forEach(r => {
        const esdup = existentes.some(ex =>
          (r['Id'] && ex['Id'] && String(r['Id']) === String(ex['Id'])) ||
          (r['N° de Factura'] && ex['N° de Factura'] &&
           String(r['N° de Factura']) === String(ex['N° de Factura']) &&
           String(r[cpField]||'') === String(ex[cpField]||''))
        );
        if (esdup) { duplicados++; return; }
        existentes.push(r);
        nuevos++;
      });

      saveLocal(tipo);
      render();
      let msg = `✅ ${nuevos} registros importados`;
      if (duplicados > 0) msg += ` · ${duplicados} duplicados omitidos`;
      toast(msg);
    } catch(err) {
      alert('Error al leer el archivo: ' + err.message);
    }
  };
  if (file.name.toLowerCase().endsWith('.csv')) {
    reader.readAsArrayBuffer(file);
  } else {
    reader.readAsArrayBuffer(file);
  }
}

function syncStatusLabel(tipo) {
  const n = (data[tipo]||[]).length;
  const s = syncStatus[tipo];
  if (s === 'loading') return `<span style="color:#2980b9">⏳ Cargando…</span>`;
  if (s === 'error')   return `<span style="color:#e74c3c">⚠️ Error al conectar</span>`;
  if (n > 0)           return `<span style="color:#27ae60">✓ ${n} registros</span>`;
  return `<span style="color:#999">Sin datos — presioná Actualizar</span>`;
}

async function syncDesdeScript(tipo) {
  syncStatus[tipo] = 'loading';
  render();
  try {
    const resp = await fetch(APPS_SCRIPT_URL + '?tipo=' + tipo);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const json = await resp.json();
    if (!json.ok) throw new Error(json.error || 'Error desconocido');
    // Normalizar fechas largas tipo "Tue Feb 10 2026 00:00:00 GMT-0300..."
    data[tipo] = (json.data || []).map(r => {
      const out = {};
      Object.entries(r).forEach(([k, v]) => {
        if (typeof v === 'string' && /^\w{3} \w{3} \d{2} \d{4}/.test(v)) {
          const d = new Date(v);
          out[k] = isNaN(d) ? v : d.toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric'});
        } else {
          out[k] = v;
        }
      });
      return out;
    });
    saveLocal(tipo);
    syncStatus[tipo] = 'ok';
    render();
    toast(`✅ ${data[tipo].length} registros de ${tipo} cargados`);
  } catch(err) {
    syncStatus[tipo] = 'error';
    render();
    toast(`❌ Error en ${tipo}: ${err.message}`);
  }
}

function parseCSV(csv) {
  const lines=csv.split('\n').filter(l=>l.trim());
  if(lines.length<2) return [];
  const headers=parseCSVLine(lines[0]);
  return lines.slice(1).map(line=>{
    const vals=parseCSVLine(line);
    const obj={};
    headers.forEach((h,i)=>{ obj[h]=(vals[i]||'').trim(); });
    return obj;
  }).filter(r=>Object.values(r).some(v=>v));
}

function parseCSVLine(line) {
  const res=[]; let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){res.push(cur);cur='';}
    else cur+=c;
  }
  res.push(cur); return res;
}

function renderProyectos() {
  const p = data.proyectos || [];
  const st = proyState;

  // Filtrar
  let rows = p;
  if (st.search) {
    const q = st.search.toLowerCase();
    rows = rows.filter(r => ['numero','nombre','cliente','estado','direccion'].some(c => String(r[c]||'').toLowerCase().includes(q)));
  }
  if (st.filtroEstado) rows = rows.filter(r => (r.estado||'').toLowerCase() === st.filtroEstado);

  const COLS = ['numero','nombre','cliente','estado','monto','moneda','inicio','fin','direccion'];
  const LABELS = {'numero':'N° Obra','nombre':'Nombre','cliente':'Cliente','estado':'Estado','monto':'Monto','moneda':'Moneda','inicio':'Inicio','fin':'Fin Est.','direccion':'Dirección'};

  const totalPages = Math.max(1, Math.ceil(rows.length / st.perPage));
  st.page = Math.min(st.page, totalPages);
  const pageRows = rows.slice((st.page-1)*st.perPage, st.page*st.perPage);

  return `
  <div class="config-panel">
    <div class="config-row">
      <span style="font-size:13px;font-weight:600">Proyectos</span>
      <button class="btn btn-sync btn-sm" onclick="syncDesdeScript('proyectos')">🔄 Actualizar desde Drive</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="toolbar-left">
      <span class="section-title">Proyectos</span>
      <span class="section-count">${rows.length} obras</span>
    </div>
    <div class="toolbar-right">
      <input type="text" class="inp-search" id="proy-search" placeholder="Buscar..." value="${esc(st.search)}">
      <select class="sel-filter" id="proy-estado">
        <option value="">Todos los estados</option>
        ${['Presupuestado','Ganado','En curso','Pausado','Finalizado','Perdido','Cancelado'].map(e=>`<option value="${e.toLowerCase()}" ${st.filtroEstado===e.toLowerCase()?'selected':''}>${e}</option>`).join('')}
      </select>
      <button class="btn btn-primary" onclick="openProy(null)">+ Nueva obra</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        ${COLS.map(c=>`<th>${LABELS[c]}</th>`).join('')}
        <th>Acciones</th>
      </tr></thead>
      <tbody>
        ${pageRows.length===0
          ? `<tr><td colspan="${COLS.length+1}" class="empty-table">Sin obras. Creá la primera.</td></tr>`
          : pageRows.map((x,i)=>{
              const realIdx = data.proyectos.indexOf(x);
              return `<tr>
                ${COLS.map(c=>`<td>${c==='estado'?badgeEstadoProy(x.estado||''):esc(String(x[c]||''))}</td>`).join('')}

                  <button class="btn btn-sm btn-danger" onclick="delProy(${realIdx})" title="Eliminar">🗑</button>
                </td>
              </tr>`;
            }).join('')}

    <div class="pagination">
      <span>${rows.length} registros · Página ${st.page} de ${totalPages}</span>
      <div class="pag-btns">
        <button class="pag-btn" id="proy-prev" ${st.page<=1?'disabled':''}>‹ Anterior</button>
        <button class="pag-btn" id="proy-next" ${st.page>=totalPages?'disabled':''}>Siguiente ›</button>
      </div>
    </div>
  </div>`;
}

function badgeEstadoProy(val) {
  const v = val.toLowerCase();
  if (v==='ganado'||v==='finalizado') return `<span class="badge badge-pagado">${esc(val)}</span>`;
  if (v==='perdido'||v==='cancelado') return `<span class="badge badge-vencido">${esc(val)}</span>`;
  if (v==='en curso') return `<span class="badge badge-cobrar">${esc(val)}</span>`;
  return `<span class="badge badge-pendiente">${esc(val)}</span>`;
}

function renderContactos(tipo) {
  const lista = tipo === 'clientes' ? contactos.clientes : contactos.proveedores;
  const st = contactoState[tipo];
  const label = tipo === 'clientes' ? 'Clientes' : 'Proveedores';

  let rows = lista;
  if (st.search) {
    const q = st.search.toLowerCase();
    rows = rows.filter(r => ['nombre','cuit','email','telefono','localidad'].some(c => String(r[c]||'').toLowerCase().includes(q)));
  }

  const totalPages = Math.max(1, Math.ceil(rows.length / st.perPage));
  st.page = Math.min(st.page, totalPages);
  const pageRows = rows.slice((st.page-1)*st.perPage, st.page*st.perPage);

  const COLS = ['nombre','cuit','telefono','celular','email','direccion','localidad','provincia'];
  const LABELS = {'nombre':'Nombre','cuit':'CUIT','telefono':'Teléfono','celular':'Celular','email':'Email','direccion':'Dirección','localidad':'Localidad','provincia':'Provincia'};

  return `
  <div class="config-panel">
    <div class="config-row">
      <span style="font-size:13px;font-weight:600">${label}</span>
      <button class="btn btn-sync btn-sm" onclick="syncContactos()">🔄 Actualizar desde Drive</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="toolbar-left">
      <span class="section-title">${label}</span>
      <span class="section-count">${rows.length} registros</span>
    </div>
    <div class="toolbar-right">
      <input type="text" class="inp-search" id="ct-search" placeholder="Buscar..." value="${esc(st.search)}">
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        ${COLS.map(c=>`<th>${LABELS[c]}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${pageRows.length===0
          ? `<tr><td colspan="${COLS.length}" class="empty-table">Sin registros.</td></tr>`
          : pageRows.map(r=>`<tr>
              ${COLS.map(c=>`<td>${esc(String(r[c]||''))}</td>`).join('')}
            </tr>`).join('')}
      </tbody>
    </table>
    <div class="pagination">
      <span>${rows.length} registros · Página ${st.page} de ${totalPages}</span>
      <div class="pag-btns">
        <button class="pag-btn" id="ct-prev" ${st.page<=1?'disabled':''}>‹ Anterior</button>
        <button class="pag-btn" id="ct-next" ${st.page>=totalPages?'disabled':''}>Siguiente ›</button>
      </div>
    </div>
  </div>`;
}

function bindContactosEventos(tipo) {
  const st = contactoState[tipo];
  document.getElementById('ct-search')?.addEventListener('input', e=>{ st.search=e.target.value; st.page=1; render(); });
  document.getElementById('ct-prev')?.addEventListener('click', ()=>{ st.page--; render(); });
  document.getElementById('ct-next')?.addEventListener('click', ()=>{ st.page++; render(); });
}

function bindProyEventos() {
  document.getElementById('proy-search')?.addEventListener('input', e=>{ proyState.search=e.target.value; proyState.page=1; render(); });
  document.getElementById('proy-estado')?.addEventListener('change', e=>{ proyState.filtroEstado=e.target.value; proyState.page=1; render(); });
  document.getElementById('proy-prev')?.addEventListener('click', ()=>{ proyState.page--; render(); });
  document.getElementById('proy-next')?.addEventListener('click', ()=>{ proyState.page++; render(); });
}


function openProy(index) {
  const x=index!==null?(data.proyectos[index]||{}):{};
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';overlay.id='modal-overlay';
  overlay.innerHTML=`
    <div class="modal">
      <div class="modal-header"><div class="modal-title">${index!==null?'Editar':'Nueva'} obra</div><button class="modal-close" id="m-close">✕</button></div>
      <div class="modal-body"><div class="form-grid">
        <div class="form-group"><label>N° de Obra</label><input id="p-num" value="${esc(x.numero||'')}"></div>
        <div class="form-group"><label>Estado</label><select id="p-est">${['Presupuestado','Ganado','En curso','Pausado','Finalizado','Perdido','Cancelado'].map(e=>`<option ${(x.estado||'')=== e?'selected':''}>${e}</option>`).join('')}</select></div>
        <div class="form-group form-full"><label>Nombre *</label><input id="p-nom" value="${esc(x.nombre||'')}"></div>
        <div class="form-group"><label>Cliente</label><input id="p-cli" value="${esc(x.cliente||'')}"></div>
        <div class="form-group"><label>CUIT</label><input id="p-cuit" value="${esc(x.cuit||'')}"></div>
        <div class="form-group"><label>Monto contrato</label><input id="p-monto" type="number" value="${esc(String(x.monto||''))}"></div>
        <div class="form-group"><label>Moneda</label><select id="p-mon"><option ${(x.moneda||'')==='ARS'?'selected':''}>ARS</option><option ${(x.moneda||'')==='USD'?'selected':''}>USD</option></select></div>
        <div class="form-group"><label>Fecha inicio</label><input id="p-ini" type="date" value="${esc(x.inicio||'')}"></div>
        <div class="form-group"><label>Fecha fin estimada</label><input id="p-fin" type="date" value="${esc(x.fin||'')}"></div>
        <div class="form-group form-full"><label>Dirección</label><input id="p-dir" value="${esc(x.direccion||'')}"></div>
        <div class="form-group form-full"><label>Notas</label><textarea id="p-not" rows="2">${esc(x.notas||'')}</textarea></div>
      </div></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="m-cancel">Cancelar</button>
        <button class="btn btn-primary" id="m-save">Guardar</button>
      </div>
    </div>`;
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
  document.body.appendChild(overlay);
  document.getElementById('m-close').addEventListener('click',closeModal);
  document.getElementById('m-cancel').addEventListener('click',closeModal);
  document.getElementById('m-save').addEventListener('click',()=>{
    const p={numero:document.getElementById('p-num').value,nombre:document.getElementById('p-nom').value,estado:document.getElementById('p-est').value,cliente:document.getElementById('p-cli').value,cuit:document.getElementById('p-cuit').value,monto:document.getElementById('p-monto').value,moneda:document.getElementById('p-mon').value,inicio:document.getElementById('p-ini').value,fin:document.getElementById('p-fin').value,direccion:document.getElementById('p-dir').value,notas:document.getElementById('p-not').value};
    if(!p.nombre){alert('El nombre es obligatorio');return;}
    if(index!==null){
      // Preservar Id original
      const orig = data.proyectos[index];
      if(orig && orig['Id']) p['Id'] = orig['Id'];
      data.proyectos[index]=p;
      saveLocal('proyectos');closeModal();render();
      toast('Actualizando obra en Sheet...');
      const payload=encodeURIComponent(JSON.stringify(p));
      const idEnc=encodeURIComponent((p['Id']||'')+'||');
      fetch(APPS_SCRIPT_URL+'?accion=update&tipo=proyectos&fila='+payload+'&id_viejo='+idEnc)
      .then(r=>r.json()).then(j=>{toast(j.ok?'Obra actualizada en Sheet':'Error: '+(j.error||''));})
      .catch(()=>toast('No se pudo conectar al Sheet'));
    } else {
      data.proyectos.push(p);
      saveLocal('proyectos');closeModal();render();
      toast('Guardando obra en Sheet...');
      const payload=encodeURIComponent(JSON.stringify(p));
      fetch(APPS_SCRIPT_URL+'?accion=append&tipo=proyectos&fila='+payload)
      .then(r=>r.json()).then(j=>{
        if(j.ok){
          if(j.id){ const idx2=data.proyectos.findIndex(r=>r===p); if(idx2>=0){data.proyectos[idx2]['Id']=String(j.id);saveLocal('proyectos');} }
          toast('Obra guardada en Sheet (Id: '+(j.id||'?')+')');
        } else toast('Error al guardar: '+(j.error||''));
      }).catch(()=>toast('No se pudo conectar al Sheet'));
    }
  });
}

function delProy(i){
  if(!confirm('¿Eliminar esta obra?'))return;
  const p=data.proyectos[i];
  const idVal=p['Id']||'';
  data.proyectos.splice(i,1);
  saveLocal('proyectos');render();
  toast('Eliminando obra del Sheet...');
  fetch(APPS_SCRIPT_URL+'?accion=delete&tipo=proyectos&id_viejo='+encodeURIComponent(idVal+'||'))
  .then(r=>r.json()).then(j=>{toast(j.ok?'Obra eliminada del Sheet':'Error: '+(j.error||''));})
  .catch(()=>toast('No se pudo conectar al Sheet'));
}

// STORAGE

function saveLocal(tipo){localStorage.setItem('bau_'+tipo,JSON.stringify(data[tipo]));}
function saveContactos(){localStorage.setItem('bau_contactos',JSON.stringify(contactos));}
function loadLocal(){
  data.compras  =JSON.parse(localStorage.getItem('bau_compras')  ||'[]');
  data.ventas   =JSON.parse(localStorage.getItem('bau_ventas')   ||'[]');
  data.proyectos=JSON.parse(localStorage.getItem('bau_proyectos')||'[]');
  // Contactos: cargar desde cache local si hay, luego sync desde Sheet
  const c=JSON.parse(localStorage.getItem('bau_contactos')||'{}');
  contactos.clientes   =c.clientes   ||[];
  contactos.proveedores=c.proveedores||[];
}

async function syncContactos() {
  try {
    const resp = await fetch(APPS_SCRIPT_URL + '?accion=contactos');
    if (!resp.ok) return;
    const json = await resp.json();
    if (!json.ok) return;
    const d = json.data || {};
    // Mapear columnas del Sheet al formato interno
    contactos.clientes = (d.clientes || []).map(r => ({
      nombre:    r['Cliente'] || '',
      cuit:      r['CUIT']      || '',
      telefono:  r['Teléfono']  || '',
      celular:   r['Teléfono 2']|| '',
      email:     r['Email']     || '',
      direccion: r['Dirección'] || '',
      localidad: r['Localidad'] || '',
      provincia: r['Provincia'] || '',
    })).filter(c => c.nombre);
    contactos.proveedores = (d.proveedores || []).map(r => ({
      nombre:    r['Proveedor'] || '',
      cuit:      r['CUIT']      || '',
      telefono:  r['Teléfono']  || '',
      celular:   r['Teléfono 2']|| '',
      email:     r['Email']     || '',
      direccion: r['Dirección'] || '',
      localidad: r['Localidad'] || '',
      provincia: r['Provincia'] || '',
    })).filter(c => c.nombre);
    saveContactos();
    console.log('Contactos cargados:', contactos.clientes.length, 'clientes,', contactos.proveedores.length, 'proveedores');
  } catch(e) { console.warn('No se pudieron cargar contactos:', e.message); }
}

function getFiltered(tipo){
  const st=tableState[tipo];
  const cols=tipo==='compras'?COLS_COMPRAS_TABLE:COLS_VENTAS_TABLE;
  let rows=data[tipo]||[];
  if(st.search){const q=st.search.toLowerCase();rows=rows.filter(r=>cols.some(c=>String(r[c]||'').toLowerCase().includes(q)));}
  if(st.filtroEstado){rows=rows.filter(r=>(r['Estado']||'').toLowerCase().includes(st.filtroEstado));}
  if(st.sortCol){rows=[...rows].sort((a,b)=>{let va=a[st.sortCol]||'',vb=b[st.sortCol]||'';const na=parseFloat(String(va).replace(/[^0-9.-]/g,'')),nb=parseFloat(String(vb).replace(/[^0-9.-]/g,''));if(!isNaN(na)&&!isNaN(nb)){va=na;vb=nb;}return va<vb?-st.sortDir:va>vb?st.sortDir:0;});}
  return rows;
}

function fmtM(val){const n=parseFloat(String(val||'').replace(/[^0-9.-]/g,''));if(isNaN(n))return esc(String(val||''));return new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:2}).format(n);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fid2(s){return s.replace(/[^a-zA-Z0-9]/g,'_');}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';clearTimeout(window._tt);window._tt=setTimeout(()=>{el.style.display='none';},2500);}
